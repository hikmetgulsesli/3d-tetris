<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETRIS 3D - Start Screen</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg-primary: #0a0a12;
            --color-bg-secondary: #12121f;
            --color-bg-card: #1a1a2e;
            --color-accent-cyan: #00f0ff;
            --color-accent-purple: #a855f7;
            --color-accent-green: #22c55e;
            --color-accent-yellow: #eab308;
            --color-accent-red: #ef4444;
            --color-accent-orange: #f97316;
            --color-accent-blue: #3b82f6;
            --color-text-primary: #ffffff;
            --color-text-secondary: #94a3b8;
            --font-heading: 'Space Grotesk', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-body);
            background: var(--color-bg-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        /* Starfield background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.2), transparent),
                radial-gradient(1px 1px at 50px 90px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.2), transparent),
                radial-gradient(1px 1px at 250px 120px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 300px 200px, rgba(255,255,255,0.2), transparent),
                radial-gradient(1px 1px at 400px 300px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 500px 400px, rgba(255,255,255,0.2), transparent);
            background-repeat: repeat;
            background-size: 600px 600px;
        }
        
        /* Nebula effect */
        .nebula {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            pointer-events: none;
        }
        
        .nebula-1 {
            top: -200px;
            right: -200px;
            background: radial-gradient(circle, var(--color-accent-purple), transparent);
        }
        
        .nebula-2 {
            bottom: -200px;
            left: -200px;
            background: radial-gradient(circle, var(--color-accent-cyan), transparent);
        }
        
        .container {
            text-align: center;
            z-index: 10;
            padding: 2rem;
        }
        
        .game-title {
            font-family: var(--font-heading);
            font-size: 6rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            background: linear-gradient(135deg, var(--color-accent-cyan), #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(0, 240, 255, 0.5), 0 0 120px rgba(0, 240, 255, 0.3);
            margin-bottom: 0.5rem;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        .game-subtitle {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 500;
            color: var(--color-accent-cyan);
            opacity: 0.8;
            letter-spacing: 0.3em;
            margin-bottom: 4rem;
        }
        
        @keyframes glow {
            from {
                filter: drop-shadow(0 0 20px rgba(0, 240, 255, 0.5));
            }
            to {
                filter: drop-shadow(0 0 40px rgba(0, 240, 255, 0.8)) drop-shadow(0 0 60px rgba(0, 240, 255, 0.5));
            }
        }
        
        .start-text {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: var(--color-accent-purple);
            letter-spacing: 0.2em;
            animation: blink 1.5s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .controls-hint {
            margin-top: 4rem;
            color: var(--color-text-secondary);
            font-size: 0.9rem;
            opacity: 0.7;
        }
        
        .key {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--color-bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            font-family: var(--font-heading);
            font-size: 0.8rem;
            margin: 0 0.25rem;
            color: var(--color-text-primary);
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    
    <div class="container">
        <h1 class="game-title">TETRIS</h1>
        <div class="game-subtitle">3D</div>
        <div class="start-text">PRESS ENTER TO START</div>
        <div class="controls-hint">
            <span class="key">←</span>
            <span class="key">→</span> Move
            <span class="key">↑</span> Rotate
            <span class="key">↓</span> Soft Drop
            <span class="key">SPACE</span> Hard Drop
        </div>
    </div>
</body>
</html>
