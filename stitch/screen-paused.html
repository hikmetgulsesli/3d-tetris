<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETRIS 3D - Paused</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg-primary: #0a0a12;
            --color-bg-secondary: #12121f;
            --color-bg-card: #1a1a2e;
            --color-bg-panel: rgba(26, 26, 46, 0.8);
            --color-accent-cyan: #00f0ff;
            --color-accent-purple: #a855f7;
            --color-accent-green: #22c55e;
            --color-accent-yellow: #eab308;
            --color-accent-red: #ef4444;
            --color-text-primary: #ffffff;
            --color-text-secondary: #94a3b8;
            --font-heading: 'Space Grotesk', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-body);
            background: var(--color-bg-primary);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* Starfield background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.2), transparent);
            background-repeat: repeat;
            background-size: 400px 400px;
        }
        
        .game-container {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 2rem;
            height: 100vh;
            padding: 1.5rem;
            position: relative;
            z-index: 10;
            filter: blur(2px);
            opacity: 0.4;
        }
        
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .panel {
            background: var(--color-bg-panel);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 1.25rem;
            backdrop-filter: blur(10px);
        }
        
        .panel-title {
            font-family: var(--font-heading);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .game-board-container {
            background: var(--color-bg-card);
            border: 2px solid rgba(0, 240, 255, 0.2);
            border-radius: 8px;
            padding: 1rem;
        }
        
        .game-board {
            width: 300px;
            height: 600px;
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
        }
        
        /* Pause Overlay */
        .pause-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 18, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        
        .pause-content {
            text-align: center;
            padding: 3rem;
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.9), rgba(18, 18, 31, 0.95));
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(168, 85, 247, 0.2);
        }
        
        .pause-title {
            font-family: var(--font-heading);
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            background: linear-gradient(135deg, var(--color-accent-purple), #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(168, 85, 247, 0.5);
            margin-bottom: 1rem;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { 
                filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.5));
                transform: scale(1);
            }
            50% { 
                filter: drop-shadow(0 0 40px rgba(168, 85, 247, 0.8));
                transform: scale(1.02);
            }
        }
        
        .pause-subtitle {
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--color-text-secondary);
            margin-bottom: 2rem;
            letter-spacing: 0.1em;
        }
        
        .pause-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        
        .btn {
            font-family: var(--font-heading);
            font-size: 0.9rem;
            font-weight: 600;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.05em;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--color-accent-purple), #9333ea);
            color: #fff;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }
        
        .btn-secondary {
            background: var(--color-bg-card);
            color: var(--color-text-primary);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
        }
        
        .pause-hint {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }
        
        .key {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 24px;
            padding: 0 0.5rem;
            background: var(--color-bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            font-family: var(--font-heading);
            font-size: 0.75rem;
            color: var(--color-text-primary);
            margin: 0 0.25rem;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <!-- Blurred background game -->
    <div class="game-container">
        <div class="side-panel">
            <div class="panel">
                <div class="panel-title">Hold Piece</div>
            </div>
        </div>
        <div class="game-area">
            <div class="game-board-container">
                <div class="game-board"></div>
            </div>
        </div>
        <div class="side-panel">
            <div class="panel">
                <div class="panel-title">Score</div>
            </div>
        </div>
    </div>
    
    <!-- Pause Overlay -->
    <div class="pause-overlay">
        <div class="pause-content">
            <h1 class="pause-title">PAUSED</h1>
            <p class="pause-subtitle">GAME ON HOLD</p>
            <div class="pause-actions">
                <button class="btn btn-primary">RESUME</button>
                <button class="btn btn-secondary">RESTART</button>
            </div>
            <p class="pause-hint">Press <span class="key">P</span> or <span class="key">ESC</span> to resume</p>
        </div>
    </div>
</body>
</html>
