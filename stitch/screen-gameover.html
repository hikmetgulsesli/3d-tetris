<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETRIS 3D - Game Over</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg-primary: #0a0a12;
            --color-bg-secondary: #12121f;
            --color-bg-card: #1a1a2e;
            --color-bg-panel: rgba(26, 26, 46, 0.8);
            --color-accent-cyan: #00f0ff;
            --color-accent-purple: #a855f7;
            --color-accent-green: #22c55e;
            --color-accent-yellow: #eab308;
            --color-accent-red: #ef4444;
            --color-accent-orange: #f97316;
            --color-text-primary: #ffffff;
            --color-text-secondary: #94a3b8;
            --font-heading: 'Space Grotesk', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-body);
            background: var(--color-bg-primary);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* Starfield background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.2), transparent);
            background-repeat: repeat;
            background-size: 400px 400px;
        }
        
        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(239, 68, 68, 0.1) 0%, rgba(10, 10, 18, 0.95) 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .game-over-content {
            text-align: center;
            padding: 3rem 4rem;
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.95), rgba(18, 18, 31, 0.98));
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 20px;
            box-shadow: 0 0 80px rgba(239, 68, 68, 0.3), 0 0 120px rgba(239, 68, 68, 0.1);
            max-width: 500px;
            width: 90%;
        }
        
        .game-over-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: linear-gradient(135deg, var(--color-accent-red), #dc2626);
            border-radius: 20px;
            font-family: var(--font-heading);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            color: #fff;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }
        
        .game-over-title {
            font-family: var(--font-heading);
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            background: linear-gradient(135deg, var(--color-accent-red), #f87171);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(239, 68, 68, 0.5);
            margin-bottom: 2rem;
        }
        
        .score-section {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .score-label {
            font-family: var(--font-heading);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        
        .final-score {
            font-family: var(--font-heading);
            font-size: 3rem;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: 1rem;
        }
        
        .high-score-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        
        .high-score-label {
            color: var(--color-text-secondary);
        }
        
        .high-score-value {
            font-family: var(--font-heading);
            font-weight: 600;
            color: var(--color-accent-yellow);
        }
        
        .new-record {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: linear-gradient(135deg, var(--color-accent-yellow), #ca8a04);
            border-radius: 8px;
            font-family: var(--font-heading);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: #000;
            animation: glow 1.5s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { box-shadow: 0 0 10px rgba(234, 179, 8, 0.5); }
            to { box-shadow: 0 0 25px rgba(234, 179, 8, 0.8); }
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-box {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 1rem;
        }
        
        .stat-box-label {
            font-size: 0.7rem;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }
        
        .stat-box-value {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--color-text-primary);
        }
        
        .game-over-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        
        .btn {
            font-family: var(--font-heading);
            font-size: 0.9rem;
            font-weight: 600;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.05em;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--color-accent-green), #16a34a);
            color: #000;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
        }
        
        .btn-secondary {
            background: var(--color-bg-card);
            color: var(--color-text-primary);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4);
        }
        
        .game-over-hint {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }
        
        .key {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 24px;
            padding: 0 0.5rem;
            background: var(--color-bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            font-family: var(--font-heading);
            font-size: 0.75rem;
            color: var(--color-text-primary);
            margin: 0 0.25rem;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <div class="game-over-overlay">
        <div class="game-over-content">
            <div class="game-over-badge">GAME OVER</div>
            <h1 class="game-over-title">GAME OVER</h1>
            
            <div class="score-section">
                <div class="score-label">Final Score</div>
                <div class="final-score">15,650</div>
                <div class="high-score-row">
                    <span class="high-score-label">High Score:</span>
                    <span class="high-score-value">45,200</span>
                </div>
                <div class="new-record">NEW RECORD!</div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-box-label">Level</div>
                    <div class="stat-box-value">4</div>
                </div>
                <div class="stat-box">
                    <div class="stat-box-label">Lines</div>
                    <div class="stat-box-value">32</div>
                </div>
                <div class="stat-box">
                    <div class="stat-box-label">Max Combo</div>
                    <div class="stat-box-value">×3</div>
                </div>
            </div>
            
            <div class="game-over-actions">
                <button class="btn btn-primary">PLAY AGAIN</button>
                <button class="btn btn-secondary">MENU</button>
            </div>
            
            <p class="game-over-hint">Press <span class="key">ENTER</span> to play again</p>
        </div>
    </div>
</body>
</html>
